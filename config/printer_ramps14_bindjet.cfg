# ============================================================
# BinderJet 3D Printer – Klipper configuration
# Board: RAMPS 1.4 on Arduino Mega 2560
# Printhead: HPC6602 inkjet (12 nozzles, controlled as "E0")
# Powder feed: stepper motor (E1, exposed as manual_stepper)
#
# Machine envelope  : X 0–200 mm  /  Y 0–100 mm  /  Z 0–(−50) mm
# Print area        : X 77.5–122.5 mm (45 mm)  /  Y 27.5–72.5 mm (45 mm)
# Build depth       : 50 mm (Z travels from 0 down to −50 mm)
#
# Steps/mm summary
#   X / Y  : GT2 belt, 20T pulley, 200 steps/rev, 16× µstep
#             rotation_distance = 40 mm  →  80 steps/mm
#   Z      : T8 leadscrew, 8 mm/rev, 200 steps/rev, 16× µstep
#             rotation_distance = 8 mm   →  400 steps/mm
#   E1     : same T8 leadscrew as Z
#             rotation_distance = 8 mm   →  400 steps/mm
#   E0 (inkjet, 96 DPI):
#             1 inch / 96 nozzles = 0.26458 mm pitch
#             3.779 fires/mm  →  rotation_distance = 847 mm
#             Max print speed ≈ 1 / (666 µs × 3.779) ≈ 397 mm/s
#
# Endstops
#   X MAX  : homing_positive_dir true  (carriage parks at X=200)
#   Y MIN  : homing_positive_dir false (platform parks at Y=0)
#   Z      : NO physical endstop.
#             stepper_z references the unused Z MAX pin (^PD2) as a
#             syntactic placeholder; [homing_override] intercepts all
#             G28 Z calls and runs SET_KINEMATIC_POSITION Z=0 instead,
#             so the pin is never actually queried during homing.
#             Operator workflow: jog piston to top surface manually,
#             then call  SET_Z_HOME  (or SET_KINEMATIC_POSITION Z=0).
#   E1 MIN : powder-feed home switch (adjust endstop_pin to your wiring)
#
# ============================================================
# Pin naming convention:
#   ar<N>  = Arduino Mega 2560 digital pin N  (board_pin alias)
#   Pxn    = AVR port/pin notation (equivalent)
#
# Wiring quick-reference
# ----------------------
# RAMPS E0 stepper connector  – inkjet axis timing (NO motor attached)
#   E0_STEP  ar26 / PA4
#   E0_DIR   ar28 / PA6
#   E0_EN    ar24 / PA2
#
# RAMPS E1 stepper connector  – powder feed motor
#   E1_STEP  ar36 / PC1
#   E1_DIR   ar34 / PC3
#   E1_EN    ar30 / PC7
#
# RAMPS AUX-3 (SPI header) – inkjet address + pulse pins
#   ar53 / PB0  → INK_PINA  (nozzle address bit 0)
#   ar52 / PB1  → INK_PINB  (nozzle address bit 1)
#   ar51 / PB2  → INK_PINC  (nozzle address bit 2)
#   ar50 / PB3  → INK_PIND  (nozzle address bit 3)
#   ar49 / PL0  → INK_PULSE0 (fire pulse)
#
# RAMPS AUX-2 – manual control buttons (active-low, internal pull-up)
#   ar40 / PG1  → BTN_UP
#   ar42 / PL7  → BTN_DOWN
#   ar44 / PL5  → BTN_LEFT  (3-pos switch leg: powder-feed mode)
#   ar65 / PK3  → BTN_RIGHT (3-pos switch leg: Z build-piston mode)
# ============================================================


# ---- MCU -------------------------------------------------------
[mcu]
# Find your port with:  ls /dev/serial/by-id/
serial: /dev/serial/by-id/usb-Arduino__www.arduino.cc__0042_XXXXXXXXXX-if00
baud: 250000


# ---- Printer kinematics ----------------------------------------
[printer]
kinematics: cartesian
max_velocity:   400      # safe headroom above 397 mm/s inkjet ceiling
max_accel:      3000
max_z_velocity: 5
max_z_accel:    100


# ---- X axis (gantry / printhead carriage) ----------------------
# Endstop: X MAX – carriage parks at X=200
[stepper_x]
step_pin: PF0          # ar54
dir_pin:  PF1          # ar55
enable_pin: !PD7       # ar38
microsteps: 16
rotation_distance: 40  # GT2 20T pulley → 80 steps/mm
endstop_pin: ^PE4      # ar2  (X MAX header on RAMPS)
position_endstop: 200
position_min: 0
position_max: 200
homing_speed: 50
homing_positive_dir: true


# ---- Y axis (build platform / recoater carriage) ---------------
# Endstop: Y MIN – platform parks at Y=0
[stepper_y]
step_pin: PF6          # ar60
dir_pin: !PF7          # ar61  (invert if motion is backwards)
enable_pin: !PF2       # ar56
microsteps: 16
rotation_distance: 40  # GT2 20T pulley → 80 steps/mm
endstop_pin: ^PJ1      # ar14  (Y MIN header on RAMPS)
position_endstop: 0
position_min: 0
position_max: 100
homing_speed: 50
homing_positive_dir: false


# ---- Z axis (build piston) -------------------------------------
# NO physical endstop.
# The pin below (Z MAX header, PD2/ar19) is a syntactic placeholder
# required by Klipper's config parser.  [homing_override] below
# intercepts every G28 that includes Z and calls
# SET_KINEMATIC_POSITION Z=0 instead, so PD2 is never consulted.
# Leave the Z MAX header unconnected (floating pin is fine with ^
# pull-up since we never query it during normal operation).
[stepper_z]
step_pin: PL3          # ar46
dir_pin:  PL1          # ar48
enable_pin: !PK0       # ar62
microsteps: 16
rotation_distance: 8   # T8 8 mm/rev → 400 steps/mm
endstop_pin: ^PD2      # ar19  Z MAX – placeholder only, never triggered
position_endstop: 0    # reported position when "homed" via SET_KINEMATIC_POSITION
position_min: -50      # 50 mm build depth (piston travels downward)
position_max: 0
homing_speed: 5


# ---- Homing override – manual Z zeroing ------------------------
# Intercepts G28 for all three axes.
# X and Y home normally via their endstops.
# Z is set to 0 immediately (operator must have already touched off
# the piston to the top surface before calling G28 or SET_Z_HOME).
[homing_override]
axes: xyz
set_position_z: 0
gcode:
    {% set do_x = 'X' in params or params|length == 0 %}
    {% set do_y = 'Y' in params or params|length == 0 %}
    {% set do_z = 'Z' in params or params|length == 0 %}

    {% if do_x %}
        G28 X
    {% endif %}
    {% if do_y %}
        G28 Y
    {% endif %}
    {% if do_z %}
        # Z has no endstop – declare current position as Z=0.
        # Make sure the piston is at the top surface before this runs.
        SET_KINEMATIC_POSITION Z=0
        M117 Z homed (manual): position set to 0
    {% endif %}


# ---- E0 – inkjet axis (timing pulses only, no motor) -----------
# The E0 stepper connector is populated for STEP/DIR/EN signals but
# no motor is attached.  inkjet_nozzle.py replaces each step pulse
# with an HPC6602 nozzle-fire sequence.
#
# rotation_distance derivation (96 DPI):
#   nozzle pitch = 25.4 mm / 96 = 0.26458 mm
#   fires/mm     = 96 / 25.4   = 3.7795
#   rotation_distance = (full_steps × microsteps) / fires_per_mm
#                     = (200 × 16) / 3.7795  ≈  847 mm
[extruder]
step_pin: PA4          # ar26  E0_STEP
dir_pin:  PA6          # ar28  E0_DIR
enable_pin: !PA2       # ar24  E0_EN
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 847         # 96 DPI → 3.779 fires/mm

# --- FDM housekeeping fields (required by Klipper, unused for inkjet) ---
nozzle_diameter: 0.265         # ≈ nozzle pitch at 96 DPI, informational only
filament_diameter: 1.0
heater_pin: PB4                # ar10  RAMPS HEAT_0  (leave disconnected)
sensor_type: NTC 100K beta 3950
sensor_pin: PK5                # analog input, unused thermistor socket
min_extrude_temp: 0            # allow moves without binder "heating"
min_temp: -50
max_temp: 100
max_extrude_only_distance: 100000

# Minimum inter-fire interval enforced at step-scheduling level:
# DEATH_PULSE_RATE = 666 µs  →  max 1501 fires/s  →  ~397 mm/s @ 96 DPI
step_pulse_duration: 0.000666


# ---- E1 – powder feed stepper (manual_stepper) -----------------
# Exposed as a manual_stepper so it is independent of the toolhead
# and can be jogged freely without affecting print coordinates.
# Adjust endstop_pin to whichever free digital input you wire the
# powder-feed home switch to (example below reuses the Z MIN header).
[manual_stepper powder_feed]
step_pin: PC1          # ar36  E1_STEP
dir_pin:  PC3          # ar34  E1_DIR
enable_pin: !PC7       # ar30  E1_EN
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 8   # T8 8 mm/rev → 400 steps/mm
endstop_pin: ^PD3      # ar18  Z MIN header – change to your actual wiring
velocity: 5
accel: 20


# ---- Inkjet nozzle module --------------------------------------
[inkjet_nozzle]
pin_a:     ar53        # PB0  INK_PINA  (address bit 0)
pin_b:     ar52        # PB1  INK_PINB  (address bit 1)
pin_c:     ar51        # PB2  INK_PINC  (address bit 2)
pin_d:     ar50        # PB3  INK_PIND  (address bit 3)
pin_pulse: ar49        # PL0  INK_PULSE0
inkjet_stepper: extruder
manual_move_step:  0.1   # mm per button-press event
manual_move_speed: 5.0   # mm/s for button-driven moves


# ---- Physical buttons (RAMPS AUX-2, active-low w/ pull-up) -----
[gcode_button btn_up]
pin: !ar40             # PG1  BTN_UP
press_gcode:   _INKJET_BTN_UP_PRESS
release_gcode: _INKJET_BTN_UP_RELEASE

[gcode_button btn_down]
pin: !ar42             # PL7  BTN_DOWN
press_gcode:   _INKJET_BTN_DOWN_PRESS
release_gcode: _INKJET_BTN_DOWN_RELEASE

[gcode_button btn_left]
pin: !ar44             # PL5  BTN_LEFT  → 3-pos switch: powder-feed mode
press_gcode:   _INKJET_BTN_LEFT_PRESS
release_gcode: _INKJET_BTN_LEFT_RELEASE

[gcode_button btn_right]
pin: !ar65             # PK3  BTN_RIGHT → 3-pos switch: Z piston mode
press_gcode:   _INKJET_BTN_RIGHT_PRESS
release_gcode: _INKJET_BTN_RIGHT_RELEASE


# ---- Board pin aliases (RAMPS 1.4) -----------------------------
[board_pins ramps14]
aliases:
    X_STEP=PF0,   X_DIR=PF1,   X_EN=PD7,   X_MIN=PE5,  X_MAX=PE4,
    Y_STEP=PF6,   Y_DIR=PF7,   Y_EN=PF2,   Y_MIN=PJ1,  Y_MAX=PJ0,
    Z_STEP=PL3,   Z_DIR=PL1,   Z_EN=PK0,   Z_MIN=PD3,  Z_MAX=PD2,
    E0_STEP=PA4,  E0_DIR=PA6,  E0_EN=PA2,
    E1_STEP=PC1,  E1_DIR=PC3,  E1_EN=PC7,
    HEAT_0=PB4,   HEAT_1=PH6,  HEAT_BED=PH5,
    FAN=PH6,
    TEMP_0=PK5,   TEMP_1=PK6,  TEMP_BED=PK7,
    INK_PINA=PB0, INK_PINB=PB1, INK_PINC=PB2, INK_PIND=PB3,
    INK_PULSE=PL0,
    BTN_UP=PG1,   BTN_DOWN=PL7, BTN_LEFT=PL5, BTN_RIGHT=PK3


