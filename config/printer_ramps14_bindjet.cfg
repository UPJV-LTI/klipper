# ============================================================
# G-code macros
# ============================================================

[gcode_macro PRINT_START]
description: Called at the start of every print job
gcode:
    G28 X Y                         # home X (MAX) and Y (MIN)
    # Z must be manually touched off before printing:
    #   jog piston to top surface → run SET_Z_HOME
    G90                             # absolute positioning
    SET_NOZZLE_CODE CODE=4096       # ensure inkjet is idle (disabled)
    M117 BinderJet ready


[gcode_macro PRINT_END]
description: Called at the end of every print job
gcode:
    SET_NOZZLE_CODE CODE=4096       # disable inkjet
    G90
    G1 X100 Y0 F3000                # park carriage at centre-X, Y=0
    M84                             # disable steppers
    M117 Print complete


# ---- Layer change ----------------------------------------------
# Lower the build piston by |DEPTH| mm.  Default: 0.1 mm layer.
# Call as:  LAYER_CHANGE          (uses 0.1 mm default)
#           LAYER_CHANGE DEPTH=0.05
[gcode_macro LAYER_CHANGE]
description: Lower build piston one layer (DEPTH mm, default 0.1)
variable_z_speed: 2.0
gcode:
    {% set depth = params.DEPTH|default(0.1)|float %}
    G91
    G1 Z-{depth} F{printer["gcode_macro LAYER_CHANGE"].z_speed * 60}
    G90


# ---- Inkjet nozzle test ----------------------------------------
# Jog E0 by 1 mm while firing CODE (default: all 12 nozzles = 0xFFF).
# Usage: TEST_INKJET
#        TEST_INKJET CODE=2730      # every other nozzle  (0xAAA)
[gcode_macro TEST_INKJET]
description: Fire nozzles over a 1 mm E0 move (CODE=0..4095, default 4095)
gcode:
    {% set code = params.CODE|default(4095)|int %}
    G1 E1 F60 S{code}
    SET_NOZZLE_CODE CODE=4096
    M117 Inkjet test done (code={code})


# ---- Powder feed homing ----------------------------------------
# Homes E1 toward MIN endstop then backs off 2 mm.
[gcode_macro HOME_POWDER_FEED]
description: Home the powder-feed axis to its MIN endstop
variable_backoff: 2.0
gcode:
    MANUAL_STEPPER STEPPER=powder_feed ENABLE=1
    MANUAL_STEPPER STEPPER=powder_feed SPEED=10 ACCEL=20 MOVE=-200 STOP_ON_ENDSTOP=1
    MANUAL_STEPPER STEPPER=powder_feed SET_POSITION=0
    MANUAL_STEPPER STEPPER=powder_feed SPEED=5 MOVE={printer["gcode_macro HOME_POWDER_FEED"].backoff}
    M117 Powder feed homed


# ---- Manual Z touch-off ----------------------------------------
# Jog the piston to the top surface of the powder bed, then call
# this macro to declare that position as Z=0.
[gcode_macro SET_Z_HOME]
description: Declare current piston position as Z=0
gcode:
    SET_KINEMATIC_POSITION Z=0
    M117 Z zeroed at current position
